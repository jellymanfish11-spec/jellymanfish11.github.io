<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>ΓIИƎ</h1>

        <p class="subtitle">
            アカウントへログイン
        </p>

        <form id="loginForm">

            <label>メールアドレス</label>
            <input
                type="email"
                id="email"
                placeholder="example@example.com"
                required
            >

            <label>パスワード</label>
            <input
                type="password"
                id="password"
                placeholder="パスワード"
                required
            >

            <button type="submit">
                ログイン
            </button>

        </form>

    </div>
    <br/>※これはフィッシング体験ページです
</div>


<script src="script.js"></script>

</body>
</html>
